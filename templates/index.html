<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliyar Ishrath | ✨ Pookie Portfolio</title>
    <style>
        :root {
            --pookie-pink: #ffc1cc;
            --pookie-lavender: #e0b0ff;
            --pookie-white: rgba(255, 255, 255, 0.7);
            --text-dark: #6d4c41;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
            overflow-x: hidden;
            background: linear-gradient(135deg, #fff5f7 0%, #fce4ec 100%);
        }

        /* --- POOKIE BACKGROUND ANIMATION --- */
        .pookie-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0.4;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-100px) translateX(50px); }
        }

        /* --- FLOATING LAYOUT --- */
        .pookie-container {
            width: 90%;
            max-width: 600px;
            background: var(--pookie-white);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            border: 3px solid #ffffff;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.3);
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .header h1 {
            font-size: 2.5rem;
            color: #ff80ab;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
            margin-bottom: 5px;
        }

        .status-tag {
            display: inline-block;
            background: #f8bbd0;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #ad1457;
        }

        /* --- CUTE FORM --- */
        .vibe-form {
            background: rgba(255, 255, 255, 0.5);
            padding: 25px;
            border-radius: 30px;
            margin-bottom: 30px;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #ffdde1;
            border-radius: 20px;
            background: white;
            outline: none;
            text-align: center;
        }

        button {
            background: #ff80ab;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 128, 171, 0.4);
        }

        button:hover {
            background: #f06292;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 128, 171, 0.6);
        }

        /* --- JOURNAL CARDS --- */
        .journal-feed {
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .journal-card {
            background: white;
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 15px;
            border-left: 8px solid #f8bbd0;
            position: relative;
        }

        .journal-card h4 { color: #ec407a; margin-bottom: 5px; }
        .journal-card p { font-size: 0.95rem; }
        .journal-card small { color: #b0bec5; display: block; margin-top: 10px; }

    </style>
</head>
<body>

    <div class="pookie-bg">
        <div class="bubble" style="width: 100px; height: 100px; top: 10%; left: 10%;"></div>
        <div class="bubble" style="width: 150px; height: 150px; top: 60%; left: 80%; animation-delay: 2s;"></div>
        <div class="bubble" style="width: 80px; height: 80px; top: 80%; left: 20%; animation-delay: 4s;"></div>
        <div class="bubble" style="width: 120px; height: 120px; top: 20%; left: 70%; animation-delay: 1s;"></div>
    </div>

    <div class="pookie-container">
        <div class="header">
            <h1>Aliyar Ishrath</h1>
            <div class="status-tag">✨ Software Princess ✨</div>
        </div>

        <div class="vibe-form">
            <h3 style="margin-bottom: 15px; color: #ff80ab;">Post a Vibe Check</h3>
            <form action="/add" method="POST">
                <input type="text" name="skill" placeholder="What are we learning today?" required>
                <textarea name="notes" placeholder="Drop some notes here..."></textarea>
                <button type="submit">💖 Post 💖</button>
            </form>
        </div>

        <div class="journal-feed">
            <h3 style="margin-bottom: 15px; border-bottom: 2px solid #ffdde1; padding-bottom: 5px;">My Diary</h3>
            {% for post in posts %}
            <div class="journal-card">
                <h4>{{ post.skill }}</h4>
                <p>{{ post.notes }}</p>
                <small>Posted on {{ post.date }}</small>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
