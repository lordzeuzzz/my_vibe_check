<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek Kuriakose | Dev Terminal</title>
    <style>
        :root {
            --bg-dark: #0a0b10;
            --glass-bg: rgba(17, 25, 40, 0.75);
            --glass-border: rgba(255, 255, 255, 0.125);
            --accent-blue: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --text-primary: #e6edf3;
            --text-secondary: #7d8590;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        /* --- LAYOUT STRUCTURE --- */
        .dashboard {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            max-width: 1100px;
            width: 100%;
        }

        /* --- GLASSMORPHIC SIDEBAR --- */
        .sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            height: fit-content;
            position: sticky;
            top: 40px;
        }

        .profile-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: bold; color: var(--bg-dark);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .sidebar h1 { font-size: 1.5rem; margin-bottom: 8px; color: var(--accent-blue); }
        .sidebar p { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; }

        /* --- MAIN FEED --- */
        .feed-area { display: flex; flex-direction: column; gap: 24px; }

        /* --- INPUT CARD --- */
        .input-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .input-card h3 { font-size: 1rem; color: var(--accent-blue); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px;
            color: white;
            margin-bottom: 12px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-blue); box-shadow: 0 0 10px var(--accent-glow); }

        button {
            width: 100%;
            background: var(--accent-blue);
            color: var(--bg-dark);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-glow); }

        /* --- UPDATE CARDS --- */
        .update-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            transition: 0.3s;
        }

        .update-card:hover { border-color: var(--accent-blue); transform: translateX(5px); }
        .update-card h4 { color: var(--accent-blue); margin-bottom: 8px; }
        .update-card p { font-size: 0.95rem; color: var(--text-primary); opacity: 0.9; }
        .update-card .meta { display: block; margin-top: 15px; font-size: 0.75rem; color: var(--text-secondary); }

        /* Mobile View */
        @media (max-width: 850px) {
            .dashboard { grid-template-columns: 1fr; }
            .sidebar { position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <aside class="sidebar">
            <div class="profile-icon">AK</div>
            <h1>Abhishek Kuriakose</h1>
            <p>Full-Stack Developer | Python & C Enthusiast</p>
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--glass-border);">
                <p style="color: var(--accent-blue); font-weight: bold;">Assignment 2026</p>
                <p>MongoDB • Flask • Vercel</p>
            </div>
        </aside>

        <main class="feed-area">
            <section class="input-card">
                <h3>System Status Update</h3>
                <form action="/add" method="POST">
                    <input type="text" name="skill" placeholder="Skill / Topic" required>
                    <textarea name="notes" placeholder="Detailed notes..." rows="3"></textarea>
                    <button type="submit">Push to Cloud Database</button>
                </form>
            </section>

            <div class="updates-container">
                <h3 style="margin-bottom: 15px; padding-left: 10px; font-size: 0.9rem; color: var(--text-secondary);">Recent Activity Logs</h3>
                {% for post in posts %}
                <div class="update-card">
                    <h4>{{ post.skill }}</h4>
                    <p>{{ post.notes }}</p>
                    <span class="meta">Timestamp: {{ post.date }} | Node: MongoDB-Atlas</span>
                </div>
                {% endfor %}
            </div>
        </main>
    </div>

</body>
</html>
