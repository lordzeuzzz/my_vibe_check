<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web | Alan Thomas</title>
    <style>
        :root {
            --bg-color: #05070a;
            --hub-bg: rgba(15, 22, 33, 0.7);
            --card-bg: rgba(22, 30, 42, 0.9);
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
            --accent: #00ff88; /* Cyber Lime */
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #0d1b2a, var(--bg-color));
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }

        /* Animated Grid Background Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: perspective(1000px) rotateX(60deg) translateY(-200px);
            animation: gridScroll 30s linear infinite;
            opacity: 0.5;
        }

        @keyframes gridScroll {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }

        .terminal-hub {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
        }

        /* Sidepanel with "My Web" Branding */
        .sidepanel {
            background: var(--hub-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            height: fit-content;
            position: sticky;
            top: 50px;
        }

        .sidepanel h1 { 
            font-size: 2.2rem; 
            margin-bottom: 10px; 
            color: var(--accent); 
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            text-transform: uppercase;
        }

        .sidepanel h2 { font-size: 1.2rem; color: #fff; margin-bottom: 15px; }

        /* Main Content Area */
        .main-feed { display: flex; flex-direction: column; gap: 25px; }

        .glass-card {
            background: var(--hub-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            color: white;
            margin-bottom: 15px;
            outline: none;
        }

        button {
            width: 100%;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { 
            background: var(--accent); 
            color: #05070a; 
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); 
        }

        .feed-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
        }

        @media (max-width: 850px) {
            .terminal-hub { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="terminal-hub">
        <aside class="sidepanel">
            <h1>My Web</h1>
            <h2>Alan Thomas</h2>
            <p style="color: var(--text-dim); font-size: 0.9rem;">Full-Stack Developer Portal</p>
            <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border);">
                <p style="color: var(--accent); font-size: 0.8rem;">SEC ASSIGNMENT 2026</p>
            </div>
        </aside>

        <main class="main-feed">
            <section class="glass-card">
                <h3 style="color: var(--accent); margin-bottom: 20px;">SYSTEM LOG</h3>
                <form action="/add" method="POST">
                    <input type="text" name="skill" placeholder="Topic..." required>
                    <textarea name="notes" placeholder="Notes..." rows="3"></textarea>
                    <button type="submit">PUSH TO DATABASE</button>
                </form>
            </section>

            <div class="logs">
                <h3 style="margin-bottom: 15px; padding-left: 10px; color: var(--text-dim);">RECENT ENTRIES</h3>
                {% for post in posts %}
                <div class="feed-item">
                    <h4 style="color: var(--accent);">{{ post.skill }}</h4>
                    <p>{{ post.notes }}</p>
                    <small style="color: var(--text-dim);">{{ post.date }}</small>
                </div>
                {% endfor %}
            </div>
        </main>
    </div>

</body>
</html>
